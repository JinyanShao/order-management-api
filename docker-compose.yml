services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://orders:orders@postgres:5432/orders
      JWT_SECRET_KEY: local-compose-secret-key-change-before-production
      CORS_ORIGINS: '["http://localhost:3000"]'
      TRUSTED_HOSTS: '["localhost","127.0.0.1"]'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "8000:8000"

volumes:
  postgres_data:
